excluder:
  max_age: 120
  min_age: -1
features:
  agg_kwargs:
    agg_func: first
    agg_window: 25
    regex: ^(?:LAB).*
  values:
    value_creator_kwargs:
      bin_mapping_func:
        _target_: corebehrt.functional.features.values.power_bin_info_efficiency_mean
      bin_values: false
    value_type: concat
logging:
  level: INFO
  path: ./outputs/logs
paths:
  data: ./example_data/lab_correlated_MEDS_data
  features: ./outputs/features
  tokenized: ./outputs/tokenized
tokenizer:
  cls_token: true
  sep_tokens: false
