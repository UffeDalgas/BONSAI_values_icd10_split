logging:
  level: INFO
  path: ./outputs/logs

paths:
  features: ./outputs/features_baseline       # subjects identical across arms; baseline is fine
  tokenized: ./outputs/tokenized_baseline
  initial_pids: pids_tuning.pt
  outcomes: ./outputs/outcomes/
  outcome: MORTALITY.csv
  cohort: ./outputs/cohort/finetune/          # SHARED output, reused by every condition

selection:
  exclude_prior_outcomes: false
  exposed_only: false
  age:
    min_years: 18
    max_years: 120

index_date:
  mode: relative
  relative:
    n_hours_from_exposure: -24

cv_folds: 2
val_ratio: 0.1
test_ratio: 0.1
