logging: {level: INFO, path: ./outputs/logs}
paths:
  prepared_data: ./outputs/pretraining/processed_data/
  model: ./outputs/pretrained_model                 # <-- this becomes your pretrain_model
data: {dataset: {select_ratio: 1.0, masking_ratio: .8, replace_ratio: .1, ignore_special_tokens: true}}
trainer_args: {batch_size: 32, effective_batch_size: 32, epochs: 20, info: true, sampler: null, gradient_clip: {clip_value: 1.0}, shuffle: true, early_stopping: null}
model: {hidden_size: 96, num_hidden_layers: 3, num_attention_heads: 3, intermediate_size: 64, type_vocab_size: 1024, embedding_dropout: 0.1, max_position_embeddings: 512, age_scale: 1e-2, abspos_scale: 1e-5, age_shift: -50, abspos_shift: -90000, value_loss_weight: 1.0, is_causal: false, value_embedding_mode: "concat"}
optimizer: {lr: 5e-4, eps: 1e-6}
scheduler: {_target_: transformers.get_linear_schedule_with_warmup, num_warmup_epochs: 2, num_training_epochs: 20}
metrics: {mlm_loss: {_target_: corebehrt.modules.monitoring.metrics.LossAccessor, loss_name: loss}}
