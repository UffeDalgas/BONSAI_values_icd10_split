logging:
  level: INFO
  path: ./outputs/logs

paths:
## INPUTS
  prepared_data: ./outputs/finetuning/processed_data_with_values/
  pretrain_model: ./outputs/pretraining_dryrun
  # restart_model: ... # Use for restarting from checkpoint

## OUTPUTS
  model: ./outputs/finetuning_dryrun_values # Save model/outputs to this folder

evaluate: false # evaluate best model on test sets

model:
  cls: default
  value_embedding_mode: "concat"  # Use concat mode for value injection

trainer_args:
  sampler_function:
    _target_: corebehrt.modules.trainer.utils.Sampling.effective_n_samples
  loss_weight_function:
    _target_: corebehrt.modules.trainer.utils.PositiveWeight.effective_n_samples
  batch_size: 16
  val_batch_size: 16
  effective_batch_size: 16
  epochs: 3  # Quick training
  info: true
  gradient_clip:
    clip_value: 1.0
  shuffle: true
  checkpoint_frequency: 1
  early_stopping: 3  # Stop early if no improvement
  stopping_criterion: roc_auc

  # Freezing options
  n_layers_to_freeze: 1
  unfreeze_on_plateau: false  # Skip for quick run
  unfreeze_at_epoch: null
  plateau_threshold: 0.01

optimizer:
  lr: 5e-4
  eps: 1e-6

scheduler:
  _target_: transformers.get_linear_schedule_with_warmup
  num_warmup_steps: 10
  num_training_steps: 50

metrics:
  accuracy:
    _target_: corebehrt.modules.monitoring.metrics.Accuracy
    threshold: 0.5
  roc_auc:
    _target_: corebehrt.modules.monitoring.metrics.ROC_AUC
  pr_auc:
    _target_: corebehrt.modules.monitoring.metrics.PR_AUC
  delong_roc_auc:
    _target_: corebehrt.modules.monitoring.metrics.Delong_ROC_AUC
