logging:
  level: INFO
  path: ./outputs/logs

paths:
## INPUTS
  prepared_data: ./outputs/pretraining/processed_data/
  # restart_model: ... # Use for restarting from checkpoint

## OUTPUTS
  model: ./outputs/pretraining_dryrun # Save model/outputs to this folder
  #runs: ./outputs/pretraining # Use for generating a new model folder

data:
  dataset:
    select_ratio: 0.1  # Use only 10% of data for quick run
    masking_ratio: .8
    replace_ratio: .1
    ignore_special_tokens: true


trainer_args:
  batch_size: 16  # Smaller batch for faster testing
  effective_batch_size: 16
  epochs: 2  # Just 2 epochs for dry run
  info: true
  sampler: null
  gradient_clip:
    clip_value: 1.0
  shuffle: true
  early_stopping: null

model:
  hidden_size: 96
  num_hidden_layers: 3
  num_attention_heads: 3
  intermediate_size: 64

  type_vocab_size: 1024
  embedding_dropout: 0.1
  max_position_embeddings: 512
  age_scale: 1e-2
  abspos_scale: 1e-5
  age_shift: -50
  abspos_shift: -90_000
  value_loss_weight: 1.0  # Weight for value prediction loss
  is_causal: false
  value_embedding_mode: "concat"  # Use concat mode for value injection

optimizer:
  lr: 5e-4
  eps: 1e-6

scheduler:
  _target_: transformers.get_linear_schedule_with_warmup
  num_warmup_epochs: 1
  num_training_epochs: 2

metrics:
  top1:
    _target_: corebehrt.modules.monitoring.metrics.PrecisionAtK
    topk: 1
  top10:
    _target_: corebehrt.modules.monitoring.metrics.PrecisionAtK
    topk: 10
  mlm_loss:
    _target_: corebehrt.modules.monitoring.metrics.LossAccessor
    loss_name: loss
